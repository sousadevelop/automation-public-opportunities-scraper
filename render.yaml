services:
  - type: worker
    name: oportunidades-publicas-telegram-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m telegram_bot.bot
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SCRAPER_BACKEND
        value: scraper.pipeline:run_scraper_pipeline
      - key: LOG_LEVEL
        value: INFO
